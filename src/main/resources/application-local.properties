spring.h2.console.enabled=true
server.ssl.client-auth=want
server.servlet.session.cookie.secure=false

spring.security.oauth2.client.registration.pingfed.client-id=${PINGFED_CLIENT_ID:local-client}
spring.security.oauth2.client.registration.pingfed.client-secret=${PINGFED_CLIENT_SECRET:local-secret}
spring.security.oauth2.client.registration.pingfed.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.pingfed.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.pingfed.scope=openid,profile,email
spring.security.oauth2.client.provider.pingfed.authorization-uri=${PINGFED_AUTHORIZATION_URI:https://pingfed.local.example/as/authorization.oauth2}
spring.security.oauth2.client.provider.pingfed.token-uri=${PINGFED_TOKEN_URI:https://pingfed.local.example/as/token.oauth2}
spring.security.oauth2.client.provider.pingfed.user-info-uri=${PINGFED_USER_INFO_URI:https://pingfed.local.example/idp/userinfo.openid}
spring.security.oauth2.client.provider.pingfed.user-name-attribute=${PINGFED_USERNAME_ATTRIBUTE:sub}

panel.security.h2-console-enabled=true
panel.security.application-clients[0].name=${GRAFANA_CLIENT_NAME:grafana}
panel.security.application-clients[0].certificate-cn=${GRAFANA_CERT_CN:grafana-local}
panel.security.application-clients[0].authorities[0]=ROLE_APP_GRAFANA
panel.security.application-clients[0].claims.environment=local
